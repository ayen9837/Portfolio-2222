        .logo a {

    /* --- Desktop/Laptop Settings --- */


/* THE GRID: Forces 2 columns side-by-side */
.works-grid {
    display: grid;
    grid-template-columns: 1fr 1fr; 
    gap: 15px; 
    max-width: 1200px;
    margin: 0 auto 40px auto;
    padding: 0 5%;
    align-items: start; 
}


/* PORTRAIT / REELS SIZE: Normal size on laptop */
.work-box.portrait .video-container {
    width: 100%;
    max-width: 320px;
    /* We use height: calc to ensure the 9:16 ratio is physically 
       there so the video has space to be centered vertically */
    height: auto;
    aspect-ratio: 9 / 16;
    
    background-color: #000; 
    border-radius: 12px;
    overflow: hidden;
    position: relative;
    
    /* This centers the black box itself in the middle of your screen/grid */
    margin: 0 auto; 

    /* Force Flexbox centering */
    display: flex !important;
    justify-content: center !important; /* Horizontal */
    align-items: center !important;     /* Vertical */
}

.work-box.portrait .video-container video {
    /* Square video logic */
    width: auto; 
    height: auto;
    
    /* This keeps it from stretching while staying centered */
    max-width: 100%;
    max-height: 100%;
    
    display: block;
    object-fit: contain;
}

/* Ensure the text under the video also stays centered on laptop */
.work-box.portrait .work-details {
    text-align: center;
    width: 100%;
}


/* LANDSCAPE / YOUTUBE SIZE: Normal size on laptop */
.work-box.landscape .video-container {
    aspect-ratio: 16 / 9;
    width: 100%;
    max-width: 450px; 
    margin: 0 auto;   
    background: #000;
}

/* BOX STYLES */
.work-box {
    background: #141414;
    border: 1px solid rgba(232, 216, 196, 0.1);
    border-radius: 12px;
    overflow: hidden;
    width: 100%;
}

.video-container video {
    width: 100%;
    height: auto;        /* Allows the video to set its own height based on original export */
    display: block;
    object-fit: contain;   /* Ensures no part of your edit is cropped */
    border-radius: 12px;   /* Optional: keeps the rounded corners you have elsewhere */
}
.work-details {
    margin-top: 15px;
    text-align: center; /* This centers the H3 and the P tag */
    width: 100%;       /* Ensures it takes up the full width of the video box */
}

.work-details h3 {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    color: #E8D8C4;
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.work-details p {
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    color: #a0a0a0; /* Slightly dimmed for better hierarchy */
    font-weight: 300;
}

/* --- MOBILE RESPONSIVE (The "Red Draw" Look) --- */
/* --- MOBILE RESPONSIVE --- */
@media (max-width: 768px) {
    .works-page-container {
        padding-top: 100px;
    }

    .works-grid {
        grid-template-columns: 1fr; 
        gap: 20px;
        padding: 0 20px;
    }

    .works-grid:has(.portrait) {
        grid-template-columns: 1fr 1fr;
        gap: 10px;
    }

    .works-grid:has(.landscape) {
        grid-template-columns: 1fr !important;
        padding: 0 !important; 
        gap: 30px !important;
        width: 100vw;
    }

    .work-box.landscape {
        border-radius: 0;
        border: none;
    }

    .work-box.landscape .video-container {
        max-width: 100% !important;
    }

    /* FIX FOR FONT SIZES: Forces them to regular size when stacked */
    .work-box.landscape .work-details h3 {
        font-size: 1.1rem !important; /* Regular size */
        margin-top: 10px;
    }

    .work-box.landscape .work-details p {
        font-size: 0.85rem !important; /* Regular size */
        margin-bottom: 15px;
    }
}

.grid-separator {
    margin-top: 80px; /* Adjust this number to increase the gap */
}

/* Main Section Title - Optimized for all screens */
.section-main-title {
    font-family: 'Akira Expanded', sans-serif;
    font-size: 1.8rem; /* Reduced from 2rem for a cleaner look */
    color: #E8D8C4;
    text-align: center;
    margin-top: 60px;
    margin-bottom: 5px; /* Tight gap to the subtitle */
    letter-spacing: 2px;
    text-transform: uppercase;
}

/* Subtitle (1M Views) */

    font-family: 'Inter', sans-serif;

    text-align: center;
    margin-bottom: 30px;
    font-weight: 400;
    letter-spacing: 1px;
}

/* Responsive Scaling for Mobile */
@media (max-width: 768px) {

        font-size: 1rem; /* "Regular" size for mobile */
        margin-top: 40px;
    }
    
    .section-subtitle {
        font-size: 0.9rem;
    }
}

/* Adjust size for mobile screens */
@media (max-width: 768px) {

        margin-top: 50px;
        margin-bottom: 25px;
    }
}
